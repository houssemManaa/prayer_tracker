<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumuah Times</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="mosque-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C10.34 2 9 3.34 9 5C9 5.71 9.24 6.36 9.64 6.88C7.23 7.74 5.22 9.53 4.22 12H3V22H21V12H19.78C18.78 9.53 16.77 7.74 14.36 6.88C14.76 6.36 15 5.71 15 5C15 3.34 13.66 2 12 2M12 4C12.55 2 13.5 4 13.5 5C13.5 5.55 13.05 6 12.5 6C11.95 6 11.5 5.55 11.5 5C11.5 4 11.45 2 12 4M6 14H8V20H6V14M10 14H14V20H10V14M16 14H18V20H16V14Z"/>
                    </svg>
                    <h1>Jumuah Times</h1>
                </div>
                <div class="header-actions">
                    <a href="tracker.html" class="btn btn-icon" title="Back to Tracker">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </a>
                </div>
            </div>
        </header>
        <main class="main-content">
            <section class="jumuah-section">
                <div class="section-header">
                    <div>
                        <h2 class="section-label" id="jumuahMasjidTitle">Jumuah Prayers</h2>
                        <div class="section-hint" id="jumuahMasjidHint">See Jumuah times and details</div>
                    </div>
                </div>
                <div id="jumuahTimesTable" style="display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-top:12px;"></div>
            </section>
        </main>
    </div>
    <script>
    const masjidSchedules = {
      masjid_al_islam: ['13:45'],
      collin_county: ['13:45', '15:00'],
      epic: ['13:45', '15:15'],
      allen: ['14:00', '15:30'],
      mckinney: ['13:45', '14:45', '15:45'],
      mas_dallas: ['13:30'],
      vric: ['13:45', '15:00'],
      carrollton: ['14:00'],
      mic: ['13:30', '14:30'],
      icr: ['14:00'],
      iatc: ['13:25'],
      alhedayah: ['13:25', '14:25']
    };

    const masjidNames = {
      masjid_al_islam: 'Masjid Al-Islam',
      icsd: 'Islamic Center of South Dallas',
      masjid_al_quran: 'Masjid Al Quran',
      al_razzaq: 'Al Razzaq Islamic Centre',
      collin_county: 'Islamic Association of Collin County',
      epic: 'East Plano Islamic Center (EPIC)',
      frisco: 'Islamic Center of Frisco',
      allen: 'Islamic Association of Allen',
      baitul_ikram: 'Masjid Baitul Ikram',
      mckinney: 'McKinney Masjid',
      iant: 'Islamic Association of North Texas (IANT)',
      mas_dallas: 'MAS Islamic Center of Dallas',
      vric: 'Valley Ranch Islamic Center (VRIC)',
      carrollton: 'Madinah Masjid of Carrollton',
      mic: 'Mesquite Islamic Center (MIC)',
      desoto: 'Islamic Association of DeSoto',
      house_of_peace: 'DeSoto House of Peace',
      icr: 'Islamic Center of Rowlett (ICR)',
      iatc: 'Islamic Association of Tarrant County',
      fort_worth: 'Islamic Association of Fort Worth',
      keller: 'Keller Islamic Center (KIC)',
      bayt_alkarim: 'Bayt Al-Karim Islamic Center',
      alhedayah: 'Al-Hedayah Academy & Masjid',
      imam_ali: 'Imam Ali Islamic Center'
    };

    function formatScheduleTime(time) {
      const [hours, minutes] = time.split(':').map(Number);
      const period = hours >= 12 ? 'PM' : 'AM';
      return `${hours % 12 || 12}:${String(minutes).padStart(2, '0')} ${period}`;
    }

    function renderJumuahTimes() {
      const params = new URLSearchParams(window.location.search);
      const masjid = params.get('masjid') || 'epic';
      const times = masjidSchedules[masjid] || [];
      document.getElementById('jumuahMasjidTitle').textContent = `${masjidNames[masjid] || masjidNames.epic} Jumuah Prayers`;
      document.getElementById('jumuahMasjidHint').textContent = times.length ? 'Current listed Jumuah times' : 'Jumuah times not verified yet';
      const table = document.getElementById('jumuahTimesTable');
      table.innerHTML = '';
      if (times.length === 0) {
        const div = document.createElement('div');
        div.className = 'iqamah-card';
        div.style.minWidth = '320px';
        div.style.fontSize = '1.2rem';
        div.style.textAlign = 'center';
        div.style.padding = '32px 16px';
        div.style.margin = '12px 0';
        div.textContent = 'Time not listed';
        table.appendChild(div);
        return;
      }
      times.forEach((time, idx) => {
        const div = document.createElement('div');
        div.className = 'iqamah-card';
        div.style.minWidth = '320px';
        div.style.fontSize = '1.5rem';
        div.style.textAlign = 'center';
        div.style.padding = '32px 16px';
        div.style.margin = '12px 0';
        div.innerHTML = `<strong>Jumuah ${idx + 1}:</strong> ${formatScheduleTime(time)}<br>` +
          `<button class='btn btn-primary' style='margin-top:16px;' onclick='markAttendance(${idx})'>I Attended</button>`;
        table.appendChild(div);
      });
    }
    document.addEventListener('DOMContentLoaded', renderJumuahTimes);
    // Attendance tracking and stats
    function markAttendance(idx) {
      const params = new URLSearchParams(window.location.search);
      const masjid = params.get('masjid') || 'epic';
      const key = `jumuahAttendance_${masjid}_${new Date().toISOString().slice(0,10)}`;
      let attendance = JSON.parse(localStorage.getItem(key) || '[]');
      if (!attendance.includes(idx)) attendance.push(idx);
      localStorage.setItem(key, JSON.stringify(attendance));
      renderStats();
      alert('Attendance marked!');
    }

    function renderStats() {
      const params = new URLSearchParams(window.location.search);
      const masjid = params.get('masjid') || 'epic';
      let streak = 0;
      let total = 0;
      let days = 0;
      let today = new Date();
      let current = 0;
      // Check last 30 days
      for (let i = 0; i < 30; i++) {
        let d = new Date(today);
        d.setDate(today.getDate() - i);
        const key = `jumuahAttendance_${masjid}_${d.toISOString().slice(0,10)}`;
        const attended = JSON.parse(localStorage.getItem(key) || '[]');
        if (attended.length > 0) {
          total++;
          if (i === current) streak++;
        } else {
          if (i === current) streak = 0;
        }
        days++;
      }
      const statsDiv = document.getElementById('statsDiv');
      statsDiv.innerHTML = `<div style='font-size:1.2rem;margin-bottom:8px;'><strong>Your Jumuah Stats (last 30 days)</strong></div>
        <div>Total Jumuahs attended: <strong>${total}</strong></div>
        <div>Current streak: <strong>${streak}</strong></div>`;
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderJumuahTimes();
      // Add stats section
      let statsDiv = document.createElement('div');
      statsDiv.id = 'statsDiv';
      statsDiv.style.margin = '32px auto';
      statsDiv.style.maxWidth = '500px';
      statsDiv.style.background = 'var(--bg-card)';
      statsDiv.style.borderRadius = 'var(--radius-md)';
      statsDiv.style.boxShadow = 'var(--shadow-md)';
      statsDiv.style.padding = '24px';
      statsDiv.style.textAlign = 'center';
      document.querySelector('.main-content').appendChild(statsDiv);
      renderStats();
    });
    </script>
</body>
</html>
