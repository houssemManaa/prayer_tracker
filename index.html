<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Tracker - Masjid Prayer Times</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="mosque-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C10.34 2 9 3.34 9 5C9 5.71 9.24 6.36 9.64 6.88C7.23 7.74 5.22 9.53 4.22 12H3V22H21V12H19.78C18.78 9.53 16.77 7.74 14.36 6.88C14.76 6.36 15 5.71 15 5C15 3.34 13.66 2 12 2M12 4C12.55 2 13.5 4 13.5 5C13.5 5.55 13.05 6 12.5 6C11.95 6 11.5 5.55 11.5 5C11.5 4 11.45 2 12 4M6 14H8V20H6V14M10 14H14V20H10V14M16 14H18V20H16V14Z"/>
                    </svg>
                    <h1>Prayer Tracker</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-icon" id="trackerBtn" title="Go to Tracker">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="4" y="4" width="16" height="16" rx="2"/>
                            <path d="M8 10h8M8 14h6M9 6h6"/>
                            <polyline points="6 10 6 10 6 10" stroke-width="3"/>
                            <polyline points="6 14 6 14 6 14" stroke-width="3"/>
                        </svg>
                    </button>
                    <button class="btn btn-icon" id="notifPermissionBtn" title="Enable Notifications">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 01-3.46 0"/>
                        </svg>
                    </button>
                    <button class="btn btn-icon" id="themeToggle" title="Toggle Theme">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                        </svg>
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                        </svg>
                    </button>
                    <button class="btn btn-icon" id="refreshBtn" title="Refresh Times">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                        </svg>
                    </button>
                    <button class="btn btn-icon" id="settingsBtn" title="Settings">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Date and Time Display -->
            <div class="datetime-display">
                <div class="current-time" id="currentTime">--:--:--</div>
                <div class="date-row">
                    <span id="gregorianDate"></span>
                    <span class="divider">•</span>
                    <span id="hijriDate"></span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Prayer Cards Carousel -->
            <div class="prayer-cards-section">
                <div class="section-header">
                    <span class="section-label">Prayer Times</span>
                    <span class="section-hint">Swipe to see all prayers</span>
                </div>
                
                <div class="prayer-cards-carousel">
                    <button class="carousel-btn prayer-prev" id="prayerPrevBtn" aria-label="Previous prayer">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    
                    <div class="prayer-cards-wrapper" id="prayerCardsWrapper">
                        <!-- Prayer cards will be dynamically generated -->
                    </div>
                    
                    <button class="carousel-btn prayer-next" id="prayerNextBtn" aria-label="Next prayer">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                </div>
                
                <div class="prayer-indicators" id="prayerIndicators"></div>

                <!-- Daily Prayer Tracker -->
                <div class="prayer-tracker" id="prayerTracker">
                    <h2 style="text-align:center;margin-bottom:12px;">Daily Prayer Tracker</h2>
                    <!-- Tracker checkboxes will be rendered here -->
                </div>
            </div>

            <section class="masjid-list-section" id="masjidListSection">
                <div class="section-header">
                    <span class="section-label" id="masjidListLabel">Masjids</span>
                    <span class="section-hint" id="masjidListHint">Iqamah times</span>
                </div>
                <div class="masjid-list" id="masjidList"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p id="footerText">Prayer times are calculated based on your selected location</p>
            <p class="footer-note" id="footerNote">Times may vary slightly from actual masjid times</p>
        </footer>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="btn btn-icon modal-close" id="closeSettings" aria-label="Close settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label for="timeFormat">Time Format</label>
                    <select id="timeFormat" class="setting-select">
                        <option value="12">12-Hour (AM/PM)</option>
                        <option value="24">24-Hour</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="themeSelect">Theme</label>
                    <select id="themeSelect" class="setting-select">
                        <option value="dark">Dark Theme</option>
                        <option value="light">Light Theme</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="language">Language</label>
                    <select id="language" class="setting-select">
                        <option value="en">English</option>
                        <option value="ar">العربية</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="saveSettings">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
